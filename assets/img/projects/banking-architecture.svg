<svg viewBox="0 0 1000 620" xmlns="http://www.w3.org/2000/svg" font-family="'Sora','Manrope',system-ui,sans-serif">
  <defs>
    <linearGradient id="bgg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0e18"/>
      <stop offset="1" stop-color="#05070d"/>
    </linearGradient>
    <linearGradient id="maroon" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#b51d35"/>
      <stop offset="1" stop-color="#7a0f1e"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="rgba(181,29,53,0.35)"/>
      <stop offset="1" stop-color="rgba(181,29,53,0)"/>
    </radialGradient>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#7fe3ff"/>
    </marker>
    <style>
      .lbl{ font-family:'JetBrains Mono',ui-monospace,monospace; fill:#7fe3ff; font-size:13px; letter-spacing:.12em; }
      .h{ fill:#eef2fb; font-weight:700; font-size:17px; }
      .s{ fill:#aeb7cc; font-size:12.5px; }
      .box{ fill:rgba(18,23,36,0.85); stroke:rgba(150,170,210,0.22); stroke-width:1.2; }
      .wire{ stroke:#58b6ff; stroke-width:2; fill:none; opacity:.85; }
    </style>
  </defs>

  <rect width="1000" height="620" fill="url(#bgg)"/>
  <ellipse cx="540" cy="270" rx="430" ry="260" fill="url(#glow)"/>

  <!-- title -->
  <text x="44" y="56" class="lbl">// MULTI-THREADED BANKING SERVER — C++ / TCP / LINUX</text>

  <!-- clients -->
  <g>
    <text x="44" y="118" class="lbl" fill="#aeb7cc">CLIENTS</text>
    <rect class="box" x="44" y="132" width="150" height="56" rx="12"/>
    <text x="119" y="160" text-anchor="middle" class="h">Client</text>
    <text x="119" y="178" text-anchor="middle" class="s">socket → request</text>
    <rect class="box" x="44" y="200" width="150" height="56" rx="12"/>
    <text x="119" y="228" text-anchor="middle" class="h">Client</text>
    <text x="119" y="246" text-anchor="middle" class="s">socket → request</text>
    <rect class="box" x="44" y="268" width="150" height="56" rx="12"/>
    <text x="119" y="296" text-anchor="middle" class="h">Client</text>
    <text x="119" y="314" text-anchor="middle" class="s">socket → request</text>
  </g>

  <!-- TCP arrows to server -->
  <path class="wire" d="M198 160 C 250 160, 250 220, 300 224" marker-end="url(#arr)"/>
  <path class="wire" d="M198 228 C 250 228, 255 228, 300 228" marker-end="url(#arr)"/>
  <path class="wire" d="M198 296 C 250 296, 250 236, 300 232" marker-end="url(#arr)"/>
  <text x="247" y="200" class="lbl">TCP/IP</text>

  <!-- server -->
  <rect x="304" y="150" width="190" height="160" rx="16" fill="rgba(122,15,30,0.28)" stroke="#b51d35" stroke-width="1.6"/>
  <text x="399" y="184" text-anchor="middle" class="lbl" fill="#7fe3ff">SERVER</text>
  <text x="399" y="214" text-anchor="middle" class="h">Listener</text>
  <text x="399" y="236" text-anchor="middle" class="s">bind · listen · accept</text>
  <rect x="328" y="256" width="142" height="38" rx="9" fill="rgba(18,23,36,0.9)" stroke="rgba(150,170,210,0.22)"/>
  <text x="399" y="280" text-anchor="middle" class="s">enqueue task</text>

  <!-- task queue -->
  <path class="wire" d="M494 275 C 540 275, 540 300, 580 300" marker-end="url(#arr)"/>
  <rect x="584" y="270" width="120" height="60" rx="12" class="box"/>
  <text x="644" y="296" text-anchor="middle" class="h" font-size="15">Task Queue</text>
  <text x="644" y="316" text-anchor="middle" class="s">FIFO · mutex</text>

  <!-- thread pool -->
  <rect x="744" y="120" width="214" height="230" rx="16" fill="rgba(18,23,36,0.6)" stroke="#58b6ff" stroke-width="1.4"/>
  <text x="851" y="150" text-anchor="middle" class="lbl">THREAD POOL</text>
  <g>
    <rect x="766" y="166" width="170" height="40" rx="10" fill="url(#maroon)"/>
    <text x="851" y="191" text-anchor="middle" class="h" font-size="14">Worker thread</text>
    <rect x="766" y="214" width="170" height="40" rx="10" fill="url(#maroon)"/>
    <text x="851" y="239" text-anchor="middle" class="h" font-size="14">Worker thread</text>
    <rect x="766" y="262" width="170" height="40" rx="10" fill="url(#maroon)"/>
    <text x="851" y="287" text-anchor="middle" class="h" font-size="14">Worker thread</text>
    <text x="851" y="328" text-anchor="middle" class="s">persistent · pull &amp; process</text>
  </g>
  <path class="wire" d="M704 300 C 724 300, 726 230, 744 222" marker-end="url(#arr)"/>

  <!-- shared state + mutex -->
  <rect x="584" y="404" width="374" height="74" rx="14" fill="rgba(18,23,36,0.85)" stroke="#43e08a" stroke-width="1.4"/>
  <text x="612" y="436" class="h" font-size="15">Shared account state</text>
  <text x="612" y="458" class="s">balances &amp; transactions — mutex-guarded</text>
  <g transform="translate(905,418)">
    <rect x="0" y="14" width="34" height="26" rx="5" fill="#43e08a"/>
    <path d="M6 14 v-6 a11 11 0 0 1 22 0 v6" fill="none" stroke="#43e08a" stroke-width="3.5"/>
    <circle cx="17" cy="26" r="3.4" fill="#05070d"/>
  </g>
  <path class="wire" d="M851 350 C 851 380, 800 392, 771 402" marker-end="url(#arr)" opacity=".7"/>

  <!-- modules row -->
  <g>
    <text x="44" y="430" class="lbl" fill="#aeb7cc">MODULES</text>
    <rect class="box" x="44" y="446" width="160" height="48" rx="11"/>
    <text x="124" y="476" text-anchor="middle" class="h" font-size="15">Finance</text>
    <rect class="box" x="220" y="446" width="160" height="48" rx="11"/>
    <text x="300" y="476" text-anchor="middle" class="h" font-size="15">Logging</text>
    <rect class="box" x="396" y="446" width="160" height="48" rx="11"/>
    <text x="476" y="470" text-anchor="middle" class="h" font-size="15">Signal handling</text>
    <text x="476" y="487" text-anchor="middle" class="s">graceful shutdown</text>
  </g>

  <!-- footer caption -->
  <text x="44" y="556" class="s" font-size="13">Concurrent client/server over TCP · thread-pool task model · mutex-protected shared state.</text>
</svg>
